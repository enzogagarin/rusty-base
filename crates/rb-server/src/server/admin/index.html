<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rusty Base Admin</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --panel: #ffffff;
      --panel-soft: #eef3ee;
      --ink: #17201b;
      --muted: #5d695f;
      --line: #d8ded7;
      --accent: #0f766e;
      --accent-strong: #0b4f4a;
      --warn: #a9441f;
      --shadow: 0 12px 34px rgba(23, 32, 27, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      padding: 8px 12px;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
      white-space: nowrap;
    }

    button:hover {
      border-color: #aeb9b0;
      background: #f9faf7;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    button.primary:hover {
      background: var(--accent-strong);
    }

    button.danger {
      border-color: #d8b7aa;
      color: var(--warn);
    }

    button.danger:hover {
      border-color: var(--warn);
      background: #fff6f1;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
      color: var(--ink);
      padding: 8px 10px;
    }

    input,
    select {
      min-height: 38px;
    }

    textarea {
      min-height: 230px;
      resize: vertical;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      outline: 2px solid rgba(15, 118, 110, 0.18);
    }

    .shell {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
      border-right: 1px solid var(--line);
      background: #fbfcf8;
      padding: 20px;
    }

    .brand {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 800;
    }

    .brand strong {
      display: block;
      overflow-wrap: anywhere;
      font-size: 15px;
      line-height: 1.2;
    }

    .brand span,
    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .nav {
      display: grid;
      gap: 6px;
    }

    .nav button {
      display: flex;
      justify-content: flex-start;
      width: 100%;
      background: transparent;
      border-color: transparent;
      text-align: left;
    }

    .nav button.active {
      background: var(--panel-soft);
      border-color: var(--line);
      color: var(--accent-strong);
      font-weight: 700;
    }

    .auth {
      display: grid;
      gap: 10px;
      margin-top: auto;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .auth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .main {
      min-width: 0;
      padding: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1.2;
      font-weight: 750;
    }

    h1 {
      font-size: 24px;
    }

    h2 {
      font-size: 16px;
    }

    .status {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      padding: 8px 10px;
      overflow-wrap: anywhere;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .metric,
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .metric {
      min-height: 86px;
      padding: 14px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      overflow-wrap: anywhere;
      font-size: 22px;
      line-height: 1.1;
    }

    .panel {
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }

    .panel-body {
      padding: 14px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--accent-strong);
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .link-button {
      min-height: 30px;
      border: 0;
      background: transparent;
      color: var(--accent-strong);
      padding: 0;
      text-align: left;
      white-space: normal;
    }

    .link-button:hover {
      background: transparent;
      color: var(--accent);
      text-decoration: underline;
    }

    .record-json {
      display: block;
      max-width: 520px;
      margin: 0;
      overflow-wrap: anywhere;
      color: var(--muted);
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
    }

    .record-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .record-toolbar {
      display: grid;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: #fbfcf8;
      padding: 12px 14px;
    }

    .record-toolbar-grid {
      display: grid;
      grid-template-columns: minmax(180px, 2fr) minmax(140px, 1fr) 120px auto;
      gap: 10px;
      align-items: end;
    }

    .record-query-actions,
    .record-pager {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .record-pager {
      justify-content: space-between;
    }

    .record-page-summary {
      color: var(--muted);
      font-weight: 700;
      min-width: 92px;
      text-align: center;
    }

    .record-editor {
      display: grid;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding: 14px;
    }

    .record-form {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcf8;
      padding: 12px;
    }

    .record-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .record-form .field label {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .record-form textarea {
      min-height: 74px;
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .field-tools {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcf8;
      padding: 12px;
    }

    .field-tools-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .field-tools-form {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) 150px minmax(160px, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .check-field {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .check-field input {
      width: auto;
      min-height: 0;
    }

    .kv {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding: 10px 0;
    }

    .kv:last-child {
      border-bottom: 0;
    }

    .kv span:first-child {
      color: var(--muted);
      font-weight: 700;
    }

    .empty {
      color: var(--muted);
      display: grid;
      gap: 10px;
      justify-items: center;
      padding: 18px;
      text-align: center;
    }

    .empty strong {
      color: var(--ink);
      font-size: 15px;
    }

    .empty-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .error {
      color: var(--warn);
      font-weight: 700;
    }

    .field.has-error input,
    .field.has-error select,
    .field.has-error textarea {
      border-color: var(--warn);
    }

    .field-error {
      color: var(--warn);
      font-size: 12px;
      font-weight: 700;
    }

    .record-file-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .record-file-list code {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--muted);
      padding: 3px 6px;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .validation-summary {
      display: grid;
      gap: 6px;
      border: 1px solid #d8b7aa;
      border-radius: 8px;
      background: #fff6f1;
      color: var(--warn);
      padding: 10px 12px;
    }

    .validation-summary ul {
      margin: 0;
      padding-left: 18px;
    }

    @media (max-width: 780px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .auth-actions,
      .field-tools-form,
      .record-toolbar-grid,
      .record-form-grid,
      .kv {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">RB</div>
        <div>
          <strong>Rusty Base Admin</strong>
          <span id="health">checking</span>
        </div>
      </div>

      <nav class="nav" aria-label="Admin views">
        <button type="button" class="active" data-view="overview">Overview</button>
        <button type="button" data-view="collections">Collections</button>
        <button type="button" data-view="records">Records</button>
        <button type="button" data-view="settings">Settings</button>
      </nav>

      <form class="auth" id="auth-form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" autocomplete="username" value="root@example.com">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password">
        </div>
        <div class="auth-actions">
          <button type="submit" class="primary">Login</button>
          <button type="button" id="init">Initialize</button>
        </div>
        <button type="button" id="logout">Logout</button>
      </form>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h1 id="view-title">Overview</h1>
          <div class="muted" id="session">No token</div>
        </div>
        <div class="status" id="status">Ready</div>
      </div>

      <section class="grid" id="metrics"></section>
      <section class="panel" id="content"></section>
    </main>
  </div>

  <script>
    const tokenKey = "rusty-base.admin.token";
    const state = {
      token: localStorage.getItem(tokenKey) || "",
      view: "overview",
      health: "unknown",
      collections: [],
      collectionDetails: {},
      selectedCollection: localStorage.getItem("rusty-base.admin.collection") || "",
      records: [],
      recordCount: 0,
      recordPage: 1,
      recordPerPage: Number(localStorage.getItem("rusty-base.admin.recordPerPage") || 20) || 20,
      recordTotalPages: 1,
      recordFilter: "",
      recordSort: "-created",
      editorMode: "",
      editorRecordId: "",
      editorText: "",
      editorError: "",
      editorValidation: {},
      collectionEditorOpen: false,
      collectionEditorMode: "",
      collectionEditorName: "",
      collectionEditorText: "",
      collectionEditorError: "",
      settings: null,
      error: ""
    };

    const $ = (id) => document.getElementById(id);
    const status = (text, failed = false) => {
      $("status").textContent = text;
      $("status").classList.toggle("error", failed);
    };

    const headers = () => state.token ? { Authorization: `Bearer ${state.token}` } : {};

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {
          ...headers(),
          ...(options.headers || {})
        }
      });
      const text = await response.text();
      let body = null;
      try {
        body = text ? JSON.parse(text) : null;
      } catch (_) {
        body = text;
      }
      if (!response.ok) {
        const message = body && body.message ? body.message : `${response.status}`;
        const error = new Error(message);
        error.status = response.status;
        error.body = body;
        throw error;
      }
      return body;
    }

    async function jsonApi(path, body, method = "POST") {
      return api(path, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
    }

    async function refresh() {
      state.error = "";
      try {
        const health = await api("/api/health");
        state.health = health.message || "ok";
      } catch (error) {
        state.health = "offline";
        state.error = error.message;
      }

      if (state.token) {
        try {
          const collections = await api("/api/collections?fields=items.id,items.name,items.type,items.system,totalItems");
          state.collections = collections.items || [];
          ensureSelectedCollection();
        } catch (error) {
          state.collections = [];
          state.collectionDetails = {};
          state.selectedCollection = "";
          state.records = [];
          state.recordCount = 0;
          state.recordTotalPages = 1;
          state.error = error.message;
        }

        if (state.selectedCollection) {
          await loadRecords(false);
        }

        try {
          state.settings = await api("/api/settings?fields=meta.appName,meta.appURL,batch.enabled,batch.maxRequests,rateLimits.enabled");
        } catch (error) {
          state.settings = null;
          state.error = error.message;
        }
      } else {
        state.collections = [];
        state.collectionDetails = {};
        state.selectedCollection = "";
        state.records = [];
        state.recordCount = 0;
        state.recordTotalPages = 1;
        state.settings = null;
      }

      render();
    }

    function render() {
      $("health").textContent = state.health;
      $("session").textContent = state.token ? "Superuser token active" : "No token";
      status(state.error || "Ready", Boolean(state.error));
      document.querySelectorAll(".nav button").forEach((button) => {
        button.classList.toggle("active", button.dataset.view === state.view);
      });

      const appName = state.settings && state.settings.meta ? state.settings.meta.appName : "Rusty Base";
      $("metrics").innerHTML = [
        metric("App", appName),
        metric("Collections", String(state.collections.length)),
        metric("Records", state.selectedCollection ? String(state.recordCount) : "-")
      ].join("");

      $("view-title").textContent = title(state.view);
      if (state.view === "collections") {
        renderCollections();
      } else if (state.view === "records") {
        renderRecords();
      } else if (state.view === "settings") {
        renderSettings();
      } else {
        renderOverview();
      }
    }

    function metric(label, value) {
      return `<div class="metric"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
    }

    function title(view) {
      return view.charAt(0).toUpperCase() + view.slice(1);
    }

    function renderOverview() {
      $("content").innerHTML = `
        <div class="panel-head">
          <h2>Instance</h2>
          <button type="button" id="refresh">Refresh</button>
        </div>
        <div class="panel-body">
          ${row("Health", state.health)}
          ${row("Session", state.token ? "active" : "none")}
          ${row("Collections", String(state.collections.length))}
        </div>
      `;
      $("refresh").addEventListener("click", refresh);
    }

    function renderCollections() {
      if (!state.token) {
        $("content").innerHTML = `
          <div class="empty">
            <strong>Login or initialize first</strong>
            <span>Collections are only available after a superuser session is active.</span>
          </div>
        `;
        return;
      }

      const rows = state.collections.map((collection) => `
        <tr>
          <td>
            <button type="button" class="link-button" data-collection-name="${escapeAttribute(collection.name || "")}">
              ${escapeHtml(collection.name || "")}
            </button>
          </td>
          <td><span class="pill">${escapeHtml(collection.type || "")}</span></td>
          <td>${collection.system ? "system" : "base"}</td>
          <td>
            <div class="record-actions">
              <button type="button" data-collection-select="${escapeAttribute(collection.name || "")}">Select</button>
              <button type="button" data-collection-edit="${escapeAttribute(collection.name || "")}">Edit</button>
              ${collection.system ? "" : `<button type="button" data-collection-truncate="${escapeAttribute(collection.name || "")}">Truncate</button>`}
              ${collection.system ? "" : `<button type="button" class="danger" data-collection-delete="${escapeAttribute(collection.name || "")}">Delete</button>`}
            </div>
          </td>
        </tr>
      `).join("");

      const body = state.collections.length ? `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Type</th><th>Scope</th><th>Actions</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      ` : `
        <div class="empty">
          <strong>No collections yet</strong>
          <span>Create a collection to start browsing and editing records.</span>
        </div>
      `;

      $("content").innerHTML = `
        <div class="panel-head">
          <h2>Collections</h2>
          <div class="record-actions">
            <button type="button" id="new-collection" class="primary">New</button>
            <button type="button" id="refresh">Refresh</button>
          </div>
        </div>
        ${body}
        ${collectionEditorHtml()}
      `;
      $("new-collection").addEventListener("click", () => {
        openCollectionEditor();
        render();
      });
      $("refresh").addEventListener("click", refresh);
      document.querySelectorAll("[data-collection-name]").forEach((button) => {
        button.addEventListener("click", async () => {
          state.selectedCollection = button.dataset.collectionName || "";
          localStorage.setItem("rusty-base.admin.collection", state.selectedCollection);
          resetRecordBrowser();
          state.view = "records";
          await loadRecords(true);
          render();
        });
      });
      document.querySelectorAll("[data-collection-select]").forEach((button) => {
        button.addEventListener("click", async () => {
          state.selectedCollection = button.dataset.collectionSelect || "";
          localStorage.setItem("rusty-base.admin.collection", state.selectedCollection);
          resetRecordBrowser();
          state.view = "records";
          await loadRecords(true);
          render();
        });
      });
      document.querySelectorAll("[data-collection-edit]").forEach((button) => {
        button.addEventListener("click", async () => {
          await openEditCollectionEditor(button.dataset.collectionEdit || "");
        });
      });
      document.querySelectorAll("[data-collection-truncate]").forEach((button) => {
        button.addEventListener("click", async () => {
          await truncateCollection(button.dataset.collectionTruncate || "");
        });
      });
      document.querySelectorAll("[data-collection-delete]").forEach((button) => {
        button.addEventListener("click", async () => {
          await deleteCollection(button.dataset.collectionDelete || "");
        });
      });
      const save = $("save-collection");
      if (save) {
        save.addEventListener("click", saveCollection);
      }
      const cancel = $("cancel-collection");
      if (cancel) {
        cancel.addEventListener("click", () => {
          closeCollectionEditor();
          render();
        });
      }
      const addField = $("add-collection-field");
      if (addField) {
        addField.addEventListener("click", addCollectionField);
      }
      document.querySelectorAll("[data-field-remove]").forEach((button) => {
        button.addEventListener("click", () => {
          removeCollectionField(Number(button.dataset.fieldRemove));
        });
      });
    }

    function collectionEditorHtml() {
      if (!state.collectionEditorOpen) {
        return "";
      }

      const title = state.collectionEditorMode === "edit"
        ? `Edit ${state.collectionEditorName}`
        : "Create collection";
      const draft = collectionEditorDraft();
      return `
        <div class="record-editor">
          <h2>${escapeHtml(title)}</h2>
          ${state.collectionEditorError ? `<div class="error">${escapeHtml(state.collectionEditorError)}</div>` : ""}
          ${collectionFieldToolsHtml(draft)}
          <textarea id="collection-json-input" spellcheck="false">${escapeHtml(state.collectionEditorText)}</textarea>
          <div class="editor-actions">
            <button type="button" id="cancel-collection">Cancel</button>
            <button type="button" id="save-collection" class="primary">Save</button>
          </div>
        </div>
      `;
    }

    function collectionFieldToolsHtml(draft) {
      if (!draft.ok) {
        return `
          <div class="field-tools">
            <div class="field-tools-head">
              <h2>Fields</h2>
              <span class="muted">Fix the collection JSON to use field tools.</span>
            </div>
          </div>
        `;
      }

      const fields = Array.isArray(draft.value.fields) ? draft.value.fields : [];
      const rows = fields.map((field, index) => `
        <tr>
          <td>${escapeHtml(field.name || "")}</td>
          <td><span class="pill">${escapeHtml(field.type || field.kind || "")}</span></td>
          <td>${field.required ? "required" : "-"}</td>
          <td>${escapeHtml(collectionFieldExtra(field))}</td>
          <td><button type="button" class="danger" data-field-remove="${index}">Remove</button></td>
        </tr>
      `).join("");

      return `
        <div class="field-tools">
          <div class="field-tools-head">
            <h2>Fields</h2>
            <span class="muted">${fields.length} user field${fields.length === 1 ? "" : "s"}</span>
          </div>
          ${fields.length ? `
            <div class="table-wrap">
              <table>
                <thead><tr><th>Name</th><th>Type</th><th>Required</th><th>Options</th><th></th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          ` : `<div class="empty"><strong>No user fields yet</strong><span>Add a field or edit the JSON directly.</span></div>`}
          <div class="field-tools-form">
            <input id="new-field-name" placeholder="field name">
            <select id="new-field-type">
              <option value="text">text</option>
              <option value="email">email</option>
              <option value="number">number</option>
              <option value="bool">bool</option>
              <option value="date">date</option>
              <option value="select">select</option>
              <option value="relation">relation</option>
              <option value="file">file</option>
              <option value="json">json</option>
              <option value="url">url</option>
              <option value="editor">editor</option>
            </select>
            <input id="new-field-option" placeholder="select values or relation target">
            <label class="check-field"><input id="new-field-required" type="checkbox">Required</label>
            <button type="button" id="add-collection-field" class="primary">Add</button>
          </div>
        </div>
      `;
    }

    function openCollectionEditor() {
      state.collectionEditorOpen = true;
      state.collectionEditorMode = "create";
      state.collectionEditorName = "";
      state.collectionEditorText = JSON.stringify({
        name: "posts",
        fields: [
          { name: "title", type: "text" }
        ]
      }, null, 2);
      state.collectionEditorError = "";
    }

    async function openEditCollectionEditor(name) {
      if (!name) {
        return;
      }

      try {
        const collection = await api(collectionPath(name));
        state.collectionEditorOpen = true;
        state.collectionEditorMode = "edit";
        state.collectionEditorName = collection.name || name;
        state.collectionEditorText = JSON.stringify(editableCollectionPayload(collection), null, 2);
        state.collectionEditorError = "";
        render();
      } catch (error) {
        status(error.message, true);
      }
    }

    function closeCollectionEditor() {
      state.collectionEditorOpen = false;
      state.collectionEditorMode = "";
      state.collectionEditorName = "";
      state.collectionEditorText = "";
      state.collectionEditorError = "";
    }

    function collectionEditorDraft() {
      try {
        return { ok: true, value: JSON.parse(state.collectionEditorText || "{}") };
      } catch (error) {
        return { ok: false, error };
      }
    }

    function readCollectionEditorPayload() {
      const input = $("collection-json-input");
      const text = input ? input.value : state.collectionEditorText;
      return JSON.parse(text || "{}");
    }

    function writeCollectionEditorPayload(payload) {
      state.collectionEditorText = JSON.stringify(payload, null, 2);
      state.collectionEditorError = "";
      render();
    }

    function addCollectionField() {
      let payload = null;
      try {
        payload = readCollectionEditorPayload();
      } catch (error) {
        state.collectionEditorText = $("collection-json-input") ? $("collection-json-input").value : state.collectionEditorText;
        state.collectionEditorError = error.message;
        render();
        return;
      }

      const name = ($("new-field-name") ? $("new-field-name").value : "").trim();
      const fieldType = $("new-field-type") ? $("new-field-type").value : "text";
      const option = ($("new-field-option") ? $("new-field-option").value : "").trim();
      const required = Boolean($("new-field-required") && $("new-field-required").checked);
      if (!name) {
        state.collectionEditorError = "Field name is required";
        state.collectionEditorText = $("collection-json-input") ? $("collection-json-input").value : state.collectionEditorText;
        render();
        return;
      }

      const fields = Array.isArray(payload.fields) ? payload.fields : [];
      if (fields.some((field) => field && field.name === name)) {
        state.collectionEditorError = `Field '${name}' already exists`;
        state.collectionEditorText = $("collection-json-input") ? $("collection-json-input").value : state.collectionEditorText;
        render();
        return;
      }
      if (fieldType === "relation" && !option) {
        state.collectionEditorError = "Relation target collection is required";
        state.collectionEditorText = $("collection-json-input") ? $("collection-json-input").value : state.collectionEditorText;
        render();
        return;
      }

      const field = { name, type: fieldType };
      if (required) {
        field.required = true;
      }
      if (fieldType === "relation") {
        if (option) {
          field.collection = option;
        }
        field.maxSelect = 1;
      } else if (fieldType === "select" && option) {
        field.values = option.split(",").map((value) => value.trim()).filter(Boolean);
      } else if (fieldType === "file") {
        field.maxSelect = 1;
      }

      payload.fields = fields.concat(field);
      writeCollectionEditorPayload(payload);
    }

    function removeCollectionField(index) {
      let payload = null;
      try {
        payload = readCollectionEditorPayload();
      } catch (error) {
        state.collectionEditorText = $("collection-json-input") ? $("collection-json-input").value : state.collectionEditorText;
        state.collectionEditorError = error.message;
        render();
        return;
      }

      if (!Array.isArray(payload.fields) || !Number.isInteger(index) || index < 0 || index >= payload.fields.length) {
        return;
      }
      payload.fields = payload.fields.filter((_, fieldIndex) => fieldIndex !== index);
      writeCollectionEditorPayload(payload);
    }

    function collectionFieldExtra(field) {
      if (field.collection) {
        return `target: ${field.collection}`;
      }
      if (Array.isArray(field.values) && field.values.length) {
        return `values: ${field.values.join(", ")}`;
      }
      if (field.maxSelect != null) {
        return `max: ${field.maxSelect}`;
      }
      return "";
    }

    async function saveCollection() {
      const input = $("collection-json-input");
      if (!input) {
        return;
      }

      let payload = null;
      try {
        payload = JSON.parse(input.value || "{}");
      } catch (error) {
        state.collectionEditorText = input.value;
        state.collectionEditorError = error.message;
        render();
        return;
      }

      try {
        const editing = state.collectionEditorMode === "edit";
        const previousName = state.collectionEditorName;
        const saved = state.collectionEditorMode === "edit"
          ? await jsonApi(collectionPath(state.collectionEditorName), payload, "PATCH")
          : await jsonApi("/api/collections", payload, "POST");
        closeCollectionEditor();
        state.selectedCollection = saved && saved.name ? saved.name : payload.name || "";
        if (state.selectedCollection) {
          localStorage.setItem("rusty-base.admin.collection", state.selectedCollection);
          if (previousName && previousName !== state.selectedCollection) {
            delete state.collectionDetails[previousName];
          }
          state.collectionDetails[state.selectedCollection] = saved;
        }
        resetRecordBrowser();
        state.view = "records";
        status(editing ? "Collection saved" : "Collection created");
        await refresh();
      } catch (error) {
        state.collectionEditorText = input.value;
        state.collectionEditorError = error.message;
        render();
      }
    }

    async function truncateCollection(name) {
      if (!name || !confirm(`Delete all records in ${name}?`)) {
        return;
      }

      try {
        await api(`${collectionPath(name)}/truncate`, { method: "DELETE" });
        if (state.selectedCollection === name) {
          await loadRecords(false);
        }
        status("Collection truncated");
        await refresh();
      } catch (error) {
        status(error.message, true);
      }
    }

    async function deleteCollection(name) {
      if (!name || !confirm(`Delete collection ${name}?`)) {
        return;
      }

      try {
        await api(collectionPath(name), { method: "DELETE" });
        delete state.collectionDetails[name];
        if (state.selectedCollection === name) {
          state.selectedCollection = "";
          localStorage.removeItem("rusty-base.admin.collection");
          resetRecordBrowser();
        }
        status("Collection deleted");
        await refresh();
      } catch (error) {
        status(error.message, true);
      }
    }

    function renderRecords() {
      const collection = currentCollection();
      if (!state.token) {
        $("content").innerHTML = `
          <div class="empty">
            <strong>Login or initialize first</strong>
            <span>Records are available after a superuser session is active.</span>
          </div>
        `;
        return;
      }

      if (!collection) {
        $("content").innerHTML = `
          <div class="empty">
            <strong>No collection selected</strong>
            <span>Create or select a collection before browsing records.</span>
            <div class="empty-actions">
              <button type="button" id="go-collections" class="primary">Go to Collections</button>
            </div>
          </div>
        `;
        $("go-collections").addEventListener("click", async () => {
          await setView("collections");
        });
        return;
      }

      const recordFields = userCollectionFields(collection);
      const visibleFields = recordFields.slice(0, 6);
      const fieldHeaders = visibleFields.map((field) => `<th>${escapeHtml(field.name || "")}</th>`).join("");
      const rows = state.records.map((record) => `
        <tr>
          <td>${escapeHtml(record.id || "")}</td>
          ${visibleFields.length
            ? visibleFields.map((field) => `<td>${recordFieldValuePreview(record, field)}</td>`).join("")
            : `<td><code class="record-json">${escapeHtml(recordPreview(record))}</code></td>`}
          <td>${escapeHtml(record.created || "-")}</td>
          <td>${escapeHtml(record.updated || "-")}</td>
          <td>
            <div class="record-actions">
              <button type="button" data-edit-record="${escapeAttribute(record.id || "")}">Edit</button>
              <button type="button" class="danger" data-delete-record="${escapeAttribute(record.id || "")}">Delete</button>
            </div>
          </td>
        </tr>
      `).join("");

      $("content").innerHTML = `
        <div class="panel-head">
          <h2>${escapeHtml(collection.name)} records</h2>
          <div class="record-actions">
            <button type="button" id="new-record" class="primary">New</button>
            <button type="button" id="refresh-records">Refresh</button>
          </div>
        </div>
        ${recordBrowserControlsHtml()}
        ${state.records.length ? `
          <div class="table-wrap">
            <table>
              <thead><tr><th>ID</th>${visibleFields.length ? fieldHeaders : "<th>Data</th>"}<th>Created</th><th>Updated</th><th>Actions</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        ` : `
          <div class="empty">
            <strong>${state.recordFilter ? "No matching records" : "No records yet"}</strong>
            <span>${state.recordFilter ? "Adjust the filter or clear it to browse this collection." : "Create the first record in this collection."}</span>
          </div>
        `}
        ${recordEditorHtml()}
      `;
      bindRecordBrowserControls();
      $("new-record").addEventListener("click", () => {
        openCreateEditor();
        render();
      });
      $("refresh-records").addEventListener("click", async () => {
        await loadRecords(false);
        render();
      });
      document.querySelectorAll("[data-edit-record]").forEach((button) => {
        button.addEventListener("click", () => {
          openEditEditor(button.dataset.editRecord || "");
          render();
        });
      });
      document.querySelectorAll("[data-delete-record]").forEach((button) => {
        button.addEventListener("click", async () => {
          await deleteRecord(button.dataset.deleteRecord || "");
        });
      });
      const save = $("save-record");
      if (save) {
        save.addEventListener("click", saveRecord);
      }
      const cancel = $("cancel-record");
      if (cancel) {
        cancel.addEventListener("click", () => {
          closeRecordEditor();
          render();
        });
      }
      const jsonInput = $("record-json-input");
      if (jsonInput) {
        jsonInput.addEventListener("input", () => {
          state.editorText = jsonInput.value;
          clearRecordValidationFeedback();
        });
      }
      document.querySelectorAll("[data-record-field]").forEach((input) => {
        const eventName = input.type === "checkbox" || input.tagName === "SELECT" ? "change" : "input";
        input.addEventListener(eventName, () => {
          syncRecordFieldFromInput(input);
        });
      });
      document.querySelectorAll("[data-record-file]").forEach((input) => {
        input.addEventListener("change", () => {
          clearRecordFieldValidationFeedback(input);
        });
      });
    }

    function recordBrowserControlsHtml() {
      const perPage = normalizedRecordPerPage();
      const totalItems = Number(state.recordCount) || 0;
      const totalPages = Math.max(1, Number(state.recordTotalPages) || Math.ceil(totalItems / perPage) || 1);
      const page = Math.min(Math.max(1, Number(state.recordPage) || 1), totalPages);
      const start = totalItems ? ((page - 1) * perPage) + 1 : 0;
      const end = totalItems ? Math.min(page * perPage, totalItems) : 0;
      const perPageOptions = [10, 20, 50, 100].map((value) => `
        <option value="${value}" ${perPage === value ? "selected" : ""}>${value}</option>
      `).join("");

      return `
        <div class="record-toolbar">
          <div class="record-toolbar-grid">
            <div class="field">
              <label for="record-filter">Filter</label>
              <input id="record-filter" value="${escapeAttribute(state.recordFilter)}" placeholder="published = true">
            </div>
            <div class="field">
              <label for="record-sort">Sort</label>
              <input id="record-sort" value="${escapeAttribute(state.recordSort)}" placeholder="-created">
            </div>
            <div class="field">
              <label for="record-per-page">Per page</label>
              <select id="record-per-page">${perPageOptions}</select>
            </div>
            <div class="record-query-actions">
              <button type="button" id="apply-record-query" class="primary">Apply</button>
              <button type="button" id="clear-record-query">Clear</button>
            </div>
          </div>
          <div class="record-pager">
            <span class="muted">${start}-${end} of ${totalItems}</span>
            <div class="record-query-actions">
              <button type="button" id="record-prev-page" ${page <= 1 ? "disabled" : ""}>Prev</button>
              <span class="record-page-summary">Page ${page} / ${totalPages}</span>
              <button type="button" id="record-next-page" ${page >= totalPages ? "disabled" : ""}>Next</button>
            </div>
          </div>
        </div>
      `;
    }

    function bindRecordBrowserControls() {
      const apply = $("apply-record-query");
      if (!apply) {
        return;
      }

      const applyQuery = async () => {
        state.recordFilter = ($("record-filter").value || "").trim();
        state.recordSort = ($("record-sort").value || "").trim();
        state.recordPerPage = normalizedRecordPerPage(Number($("record-per-page").value) || 20);
        localStorage.setItem("rusty-base.admin.recordPerPage", String(state.recordPerPage));
        state.recordPage = 1;
        await loadRecords(true);
        render();
      };

      apply.addEventListener("click", applyQuery);
      ["record-filter", "record-sort"].forEach((id) => {
        const input = $(id);
        input.addEventListener("keydown", async (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            await applyQuery();
          }
        });
      });
      $("record-per-page").addEventListener("change", applyQuery);
      $("clear-record-query").addEventListener("click", async () => {
        state.recordFilter = "";
        state.recordSort = "-created";
        state.recordPage = 1;
        await loadRecords(true);
        render();
      });
      $("record-prev-page").addEventListener("click", async () => {
        if (state.recordPage <= 1) {
          return;
        }
        state.recordPage -= 1;
        await loadRecords(true);
        render();
      });
      $("record-next-page").addEventListener("click", async () => {
        const totalPages = Math.max(1, Number(state.recordTotalPages) || 1);
        if (state.recordPage >= totalPages) {
          return;
        }
        state.recordPage += 1;
        await loadRecords(true);
        render();
      });
    }

    function recordEditorHtml() {
      if (!state.editorMode) {
        return "";
      }

      const title = state.editorMode === "edit" ? `Edit ${state.editorRecordId}` : "Create record";
      const collection = currentCollection();
      const draft = recordEditorDraft();
      return `
        <div class="record-editor">
          <h2>${escapeHtml(title)}</h2>
          ${state.editorError ? `<div class="error">${escapeHtml(state.editorError)}</div>` : ""}
          ${recordValidationSummaryHtml(collection)}
          ${recordFieldFormHtml(collection, draft)}
          <textarea id="record-json-input" spellcheck="false">${escapeHtml(state.editorText)}</textarea>
          <div class="editor-actions">
            <button type="button" id="cancel-record">Cancel</button>
            <button type="button" id="save-record" class="primary">Save</button>
          </div>
        </div>
      `;
    }

    function recordFieldFormHtml(collection, draft) {
      const fields = userCollectionFields(collection);
      if (!fields.length) {
        return "";
      }
      if (!draft.ok) {
        return `
          <div class="record-form">
            <div class="field-tools-head">
              <h2>Fields</h2>
              <span class="muted">Fix the record JSON to use field inputs.</span>
            </div>
          </div>
        `;
      }

      return `
        <div class="record-form">
          <div class="field-tools-head">
            <h2>Fields</h2>
            <span class="muted">${fields.length} field${fields.length === 1 ? "" : "s"}</span>
          </div>
          <div class="record-form-grid">
            ${fields.map((field, index) => recordFieldInputHtml(field, draft.value[field.name], index)).join("")}
          </div>
        </div>
      `;
    }

    function recordFieldInputHtml(field, value, index) {
      const name = field.name || "";
      const type = field.type || field.kind || "text";
      const inputId = `record-field-${index}`;
      const common = `id="${inputId}" data-record-field="${escapeAttribute(name)}" data-record-type="${escapeAttribute(type)}" data-record-multi="${recordFieldIsMulti(field) ? "true" : "false"}"`;
      const validation = recordFieldValidation(name);
      const fieldClass = validation ? "field has-error" : "field";
      const fieldError = validation ? `<div class="field-error">${escapeHtml(recordValidationMessage(validation))}</div>` : "";
      const label = `
        <label for="${inputId}">
          <span>${escapeHtml(name)}</span>
          <span class="pill">${escapeHtml(type)}</span>
          ${field.required ? `<span class="pill">required</span>` : ""}
        </label>
      `;

      if (type === "bool") {
        return `
          <div class="${fieldClass}">
            ${label}
            <label class="check-field"><input ${common} type="checkbox" ${value === true ? "checked" : ""}>true</label>
            ${fieldError}
          </div>
        `;
      }

      if (type === "editor" || type === "json") {
        return `
          <div class="${fieldClass}">
            ${label}
            <textarea ${common} spellcheck="false">${escapeHtml(recordFieldInputDisplayValue(value))}</textarea>
            ${fieldError}
          </div>
        `;
      }

      if (type === "select" && Array.isArray(field.values) && field.values.length && !recordFieldIsMulti(field)) {
        const options = [`<option value=""></option>`].concat(field.values.map((option) => `
          <option value="${escapeAttribute(option)}" ${String(value ?? "") === String(option) ? "selected" : ""}>${escapeHtml(option)}</option>
        `)).join("");
        return `
          <div class="${fieldClass}">
            ${label}
            <select ${common}>${options}</select>
            ${fieldError}
          </div>
        `;
      }

      if (type === "file") {
        const accept = Array.isArray(field.mimeTypes) && field.mimeTypes.length
          ? ` accept="${escapeAttribute(field.mimeTypes.join(","))}"`
          : "";
        return `
          <div class="${fieldClass}">
            ${label}
            ${recordFileValueHtml(value)}
            <input id="${inputId}" data-record-file="${escapeAttribute(name)}" type="file"${recordFieldIsMulti(field) ? " multiple" : ""}${accept}>
            ${fieldError}
          </div>
        `;
      }

      const inputType = type === "number" ? "number" : "text";
      const placeholder = type === "relation" && recordFieldIsMulti(field)
        ? "record ids, comma separated"
        : type === "relation"
          ? "record id"
          : "";
      return `
        <div class="${fieldClass}">
          ${label}
          <input ${common} type="${inputType}" value="${escapeAttribute(recordFieldInputDisplayValue(value))}" placeholder="${escapeAttribute(placeholder)}">
          ${fieldError}
        </div>
      `;
    }

    function recordValidationSummaryHtml(collection) {
      const data = recordEditorValidationData();
      const fieldNames = new Set(userCollectionFields(collection).map((field) => field.name));
      const entries = Object.entries(data).filter(([name]) => !fieldNames.has(name));
      if (!entries.length) {
        return "";
      }

      return `
        <div class="validation-summary" id="record-validation-summary">
          <strong>Validation details</strong>
          <ul>
            ${entries.map(([name, detail]) => `<li><code>${escapeHtml(name)}</code>: ${escapeHtml(recordValidationMessage(detail))}</li>`).join("")}
          </ul>
        </div>
      `;
    }

    function recordFieldValidation(name) {
      const data = recordEditorValidationData();
      const detail = data[name];
      return detail && typeof detail === "object" && !Array.isArray(detail) ? detail : null;
    }

    function recordEditorValidationData() {
      const data = state.editorValidation;
      return data && typeof data === "object" && !Array.isArray(data) ? data : {};
    }

    function recordValidationMessage(detail) {
      if (!detail || typeof detail !== "object") {
        return "Invalid value";
      }
      return detail.message || detail.code || "Invalid value";
    }

    function recordFileValueHtml(value) {
      const names = Array.isArray(value)
        ? value
        : value
          ? [value]
          : [];
      if (!names.length) {
        return `<span class="muted">-</span>`;
      }
      return `
        <div class="record-file-list">
          ${names.map((name) => `<code>${escapeHtml(name)}</code>`).join("")}
        </div>
      `;
    }

    function recordEditorDraft() {
      try {
        return { ok: true, value: JSON.parse(state.editorText || "{}") };
      } catch (error) {
        return { ok: false, error };
      }
    }

    function openCreateEditor() {
      state.editorMode = "create";
      state.editorRecordId = "";
      state.editorText = "{}";
      state.editorError = "";
      state.editorValidation = {};
    }

    function openEditEditor(id) {
      const record = state.records.find((item) => item.id === id);
      if (!record) {
        state.editorError = "Record not found";
        state.editorValidation = {};
        return;
      }
      state.editorMode = "edit";
      state.editorRecordId = id;
      state.editorText = JSON.stringify(editableRecordPayload(record), null, 2);
      state.editorError = "";
      state.editorValidation = {};
    }

    function closeRecordEditor() {
      state.editorMode = "";
      state.editorRecordId = "";
      state.editorText = "";
      state.editorError = "";
      state.editorValidation = {};
    }

    function readRecordEditorPayload() {
      const input = $("record-json-input");
      const text = input ? input.value : state.editorText;
      return JSON.parse(text || "{}");
    }

    function syncRecordFieldFromInput(input) {
      let payload = null;
      try {
        payload = readRecordEditorPayload();
      } catch (_) {
        status("Fix record JSON before using field inputs", true);
        return;
      }

      try {
        const value = recordFieldInputValue(input);
        if (value === undefined) {
          delete payload[input.dataset.recordField];
        } else {
          payload[input.dataset.recordField] = value;
        }
      } catch (error) {
        status(error.message, true);
        return;
      }

      state.editorText = JSON.stringify(payload, null, 2);
      const jsonInput = $("record-json-input");
      if (jsonInput) {
        jsonInput.value = state.editorText;
      }
      clearRecordFieldValidationFeedback(input);
    }

    function recordFieldInputValue(input) {
      const type = input.dataset.recordType || "text";
      const multi = input.dataset.recordMulti === "true";
      if (type === "bool") {
        return input.checked;
      }

      const raw = (input.value || "").trim();
      if (!raw) {
        return undefined;
      }
      if (type === "number") {
        const number = Number(raw);
        if (!Number.isFinite(number)) {
          throw new Error("Number field must be numeric");
        }
        return number;
      }
      if (type === "json") {
        return JSON.parse(raw);
      }
      if (multi) {
        return raw.split(",").map((value) => value.trim()).filter(Boolean);
      }
      return raw;
    }

    async function saveRecord() {
      const collection = currentCollection();
      const input = $("record-json-input");
      if (!collection || !input) {
        return;
      }

      let payload = null;
      try {
        payload = JSON.parse(input.value || "{}");
      } catch (error) {
        state.editorText = input.value;
        state.editorError = error.message;
        state.editorValidation = {};
        render();
        return;
      }

      try {
        const uploads = recordEditorFileUploads();
        const method = state.editorMode === "edit" ? "PATCH" : "POST";
        const path = state.editorMode === "edit"
          ? recordPath(collection.name, state.editorRecordId)
          : collectionRecordsPath(collection.name);
        await saveRecordPayload(collection, path, payload, uploads, method);
        closeRecordEditor();
        status("Saved");
        await loadRecords(true);
        render();
      } catch (error) {
        state.editorText = input.value;
        state.editorError = error.message;
        state.editorValidation = validationDataFromError(error);
        render();
      }
    }

    async function saveRecordPayload(collection, path, payload, uploads, method) {
      if (!uploads.length) {
        await jsonApi(path, payload, method);
        return;
      }

      await api(path, {
        method,
        body: recordFormDataPayload(collection, payload, uploads)
      });
    }

    function recordEditorFileUploads() {
      const uploads = [];
      document.querySelectorAll("[data-record-file]").forEach((input) => {
        Array.from(input.files || []).forEach((file) => {
          if (file && input.dataset.recordFile) {
            uploads.push({ fieldName: input.dataset.recordFile, file });
          }
        });
      });
      return uploads;
    }

    function recordFormDataPayload(collection, payload, uploads) {
      const form = new FormData();
      const uploadedFields = new Set(uploads.map((upload) => upload.fieldName));
      const fileFields = new Set(userCollectionFields(collection)
        .filter((field) => (field.type || field.kind) === "file")
        .map((field) => field.name));

      Object.entries(payload).forEach(([name, value]) => {
        if (uploadedFields.has(name) && fileFields.has(name)) {
          return;
        }
        appendRecordFormValue(form, collection, name, value);
      });
      uploads.forEach((upload) => {
        form.append(upload.fieldName, upload.file, upload.file.name);
      });
      return form;
    }

    function appendRecordFormValue(form, collection, name, value) {
      if (value === undefined) {
        return;
      }

      const field = userCollectionFields(collection).find((item) => item.name === name);
      const type = field ? (field.type || field.kind || "text") : "";
      if (type === "file") {
        return;
      }
      if (type === "relation" && recordFieldIsMulti(field) && Array.isArray(value)) {
        value.forEach((item) => form.append(name, String(item)));
        return;
      }
      if (name.endsWith("-") && Array.isArray(value)) {
        value.forEach((item) => form.append(name, String(item)));
        return;
      }
      if ((type === "json" || type === "array" || type === "geoPoint") && value != null) {
        form.append(name, JSON.stringify(value));
        return;
      }
      if (type === "select" && recordFieldIsMulti(field) && value != null) {
        form.append(name, JSON.stringify(value));
        return;
      }
      if (typeof value === "boolean") {
        form.append(name, value ? "true" : "false");
        return;
      }
      if (typeof value === "number") {
        form.append(name, String(value));
        return;
      }
      if (value == null) {
        form.append(name, "");
        return;
      }
      form.append(name, typeof value === "string" ? value : JSON.stringify(value));
    }

    function validationDataFromError(error) {
      const body = error && error.body;
      const data = body && body.data;
      return data && typeof data === "object" && !Array.isArray(data) ? data : {};
    }

    function clearRecordValidationFeedback() {
      state.editorError = "";
      state.editorValidation = {};
      const summary = $("record-validation-summary");
      if (summary) {
        summary.remove();
      }
      const editorError = document.querySelector(".record-editor > .error");
      if (editorError) {
        editorError.remove();
      }
      document.querySelectorAll(".field.has-error").forEach((field) => {
        field.classList.remove("has-error");
      });
      document.querySelectorAll(".field-error").forEach((fieldError) => {
        fieldError.remove();
      });
    }

    function clearRecordFieldValidationFeedback(input) {
      const fieldName = input.dataset.recordField || input.dataset.recordFile;
      if (!fieldName || !state.editorValidation[fieldName]) {
        return;
      }

      delete state.editorValidation[fieldName];
      const field = input.closest(".field");
      if (field) {
        field.classList.remove("has-error");
        const fieldError = field.querySelector(".field-error");
        if (fieldError) {
          fieldError.remove();
        }
      }
      if (!Object.keys(recordEditorValidationData()).length) {
        const editorError = document.querySelector(".record-editor > .error");
        if (editorError) {
          editorError.remove();
        }
        state.editorError = "";
      }
    }

    async function deleteRecord(id) {
      const collection = currentCollection();
      if (!collection || !id || !confirm(`Delete record ${id}?`)) {
        return;
      }

      try {
        await api(recordPath(collection.name, id), { method: "DELETE" });
        if (state.editorRecordId === id) {
          closeRecordEditor();
        }
        status("Deleted");
        await loadRecords(true);
        render();
      } catch (error) {
        status(error.message, true);
      }
    }

    function renderSettings() {
      const settings = state.settings || {};
      const meta = settings.meta || {};
      const batch = settings.batch || {};
      const rateLimits = settings.rateLimits || {};
      $("content").innerHTML = `
        <div class="panel-head">
          <h2>Settings</h2>
          <button type="button" id="refresh">Refresh</button>
        </div>
        <div class="panel-body">
          ${row("App name", meta.appName || "-")}
          ${row("App URL", meta.appURL || "-")}
          ${row("Batch", batch.enabled === false ? "disabled" : "enabled")}
          ${row("Max requests", batch.maxRequests == null ? "-" : String(batch.maxRequests))}
          ${row("Rate limits", rateLimits.enabled ? "enabled" : "disabled")}
        </div>
      `;
      $("refresh").addEventListener("click", refresh);
    }

    function row(label, value) {
      return `<div class="kv"><span>${escapeHtml(label)}</span><span>${escapeHtml(value)}</span></div>`;
    }

    async function setView(view) {
      state.view = view;
      if (view === "records") {
        ensureSelectedCollection();
        await loadRecords(true);
      }
      render();
    }

    function ensureSelectedCollection() {
      if (state.collections.some((collection) => collection.name === state.selectedCollection)) {
        return;
      }
      const previousCollection = state.selectedCollection;
      state.selectedCollection = state.collections[0] ? state.collections[0].name : "";
      if (state.selectedCollection) {
        localStorage.setItem("rusty-base.admin.collection", state.selectedCollection);
      }
      if (previousCollection !== state.selectedCollection) {
        resetRecordBrowser();
      }
    }

    function currentCollection() {
      return state.collectionDetails[state.selectedCollection]
        || state.collections.find((collection) => collection.name === state.selectedCollection)
        || null;
    }

    async function loadRecords(showErrors = true) {
      let collection = currentCollection();
      if (!state.token || !collection) {
        state.records = [];
        state.recordCount = 0;
        state.recordTotalPages = 1;
        return;
      }

      try {
        collection = await ensureCollectionDetails(collection.name);
        const page = await api(recordListPath(collection.name));
        state.records = page.items || [];
        state.recordCount = page.totalItems == null ? state.records.length : page.totalItems;
        state.recordPage = Number(page.page) || state.recordPage || 1;
        state.recordPerPage = normalizedRecordPerPage(Number(page.perPage) || state.recordPerPage);
        state.recordTotalPages = Number(page.totalPages) || Math.max(1, Math.ceil(state.recordCount / state.recordPerPage));
        if (showErrors) {
          state.error = "";
        }
      } catch (error) {
        state.records = [];
        state.recordCount = 0;
        state.recordTotalPages = 1;
        if (showErrors) {
          state.error = error.message;
        }
      }
    }

    function recordListPath(collectionName) {
      state.recordPage = Math.max(1, Number(state.recordPage) || 1);
      state.recordPerPage = normalizedRecordPerPage();

      const params = new URLSearchParams();
      params.set("page", String(state.recordPage));
      params.set("perPage", String(state.recordPerPage));
      const sort = String(state.recordSort || "").trim();
      const filter = String(state.recordFilter || "").trim();
      if (sort) {
        params.set("sort", sort);
      }
      if (filter) {
        params.set("filter", filter);
      }
      return `${collectionRecordsPath(collectionName)}?${params.toString()}`;
    }

    function normalizedRecordPerPage(value = state.recordPerPage) {
      const perPage = Number(value) || 20;
      return [10, 20, 50, 100].includes(perPage) ? perPage : 20;
    }

    function resetRecordBrowser() {
      state.records = [];
      state.recordCount = 0;
      state.recordPage = 1;
      state.recordTotalPages = 1;
      state.recordFilter = "";
      state.recordSort = "-created";
      closeRecordEditor();
    }

    async function ensureCollectionDetails(collectionName) {
      const cached = state.collectionDetails[collectionName];
      if (cached && Array.isArray(cached.fields)) {
        return cached;
      }

      const collection = await api(collectionPath(collectionName));
      state.collectionDetails[collection.name || collectionName] = collection;
      return collection;
    }

    function collectionRecordsPath(collectionName) {
      return `/api/collections/${encodeURIComponent(collectionName)}/records`;
    }

    function collectionPath(collectionName) {
      return `/api/collections/${encodeURIComponent(collectionName)}`;
    }

    function recordPath(collectionName, id) {
      return `${collectionRecordsPath(collectionName)}/${encodeURIComponent(id)}`;
    }

    function userCollectionFields(collection) {
      if (!collection || !Array.isArray(collection.fields)) {
        return [];
      }
      return collection.fields.filter((field) => field && field.name && !isResponseOnlyCollectionField(field));
    }

    function recordFieldIsMulti(field) {
      return Number(field.maxSelect || 1) > 1;
    }

    function recordFieldInputDisplayValue(value) {
      if (value == null) {
        return "";
      }
      if (Array.isArray(value)) {
        return value.join(", ");
      }
      if (typeof value === "object") {
        return JSON.stringify(value, null, 2);
      }
      return String(value);
    }

    function recordFieldValuePreview(record, field) {
      const value = record[field.name];
      if (value == null || value === "") {
        return `<span class="muted">-</span>`;
      }
      const text = recordFieldInputDisplayValue(value);
      const preview = text.length > 120 ? `${text.slice(0, 117)}...` : text;
      if (Array.isArray(value) || typeof value === "object") {
        return `<code class="record-json">${escapeHtml(preview)}</code>`;
      }
      return escapeHtml(preview);
    }

    function editableCollectionPayload(collection) {
      const copy = { ...collection };
      delete copy.id;
      delete copy.created;
      delete copy.updated;
      delete copy.system;
      delete copy.indexWarnings;
      if (Array.isArray(copy.fields)) {
        copy.fields = copy.fields.filter((field) => !isResponseOnlyCollectionField(field));
      }
      return copy;
    }

    function isResponseOnlyCollectionField(field) {
      if (!field || typeof field !== "object") {
        return false;
      }
      if (field.name === "id" && field.primaryKey) {
        return true;
      }
      return (field.name === "created" || field.name === "updated") && field.type === "autodate";
    }

    function editableRecordPayload(record) {
      const copy = { ...record };
      delete copy.id;
      delete copy.created;
      delete copy.updated;
      delete copy.collectionId;
      delete copy.collectionName;
      delete copy.expand;
      return copy;
    }

    function recordPreview(record) {
      const copy = { ...record };
      delete copy.collectionId;
      delete copy.collectionName;
      const text = JSON.stringify(copy, null, 2);
      return text.length > 360 ? `${text.slice(0, 357)}...` : text;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    document.querySelectorAll(".nav button").forEach((button) => {
      button.addEventListener("click", () => {
        setView(button.dataset.view);
      });
    });

    $("auth-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const body = await jsonApi("/api/collections/_superusers/auth-with-password", {
          identity: $("email").value,
          password: $("password").value
        });
        state.token = body.token || "";
        localStorage.setItem(tokenKey, state.token);
        status("Logged in");
        await refresh();
      } catch (error) {
        status(error.message, true);
      }
    });

    $("init").addEventListener("click", async () => {
      try {
        await jsonApi("/api/collections", {
          name: "_superusers",
          type: "auth",
          fields: [{ name: "email", type: "email" }]
        }).catch(() => null);
        await jsonApi("/api/collections/_superusers/records", {
          email: $("email").value,
          password: $("password").value,
          passwordConfirm: $("password").value
        });
        const body = await jsonApi("/api/collections/_superusers/auth-with-password", {
          identity: $("email").value,
          password: $("password").value
        });
        state.token = body.token || "";
        localStorage.setItem(tokenKey, state.token);
        status("Initialized and logged in");
        await refresh();
      } catch (error) {
        status(error.message, true);
      }
    });

    $("logout").addEventListener("click", async () => {
      state.token = "";
      localStorage.removeItem(tokenKey);
      state.collections = [];
      state.collectionDetails = {};
      resetRecordBrowser();
      state.settings = null;
      closeCollectionEditor();
      await refresh();
    });

    refresh();
  </script>
</body>
</html>
