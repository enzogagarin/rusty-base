<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rusty Base Admin</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --panel: #ffffff;
      --panel-soft: #eef3ee;
      --ink: #17201b;
      --muted: #5d695f;
      --line: #d8ded7;
      --accent: #0f766e;
      --accent-strong: #0b4f4a;
      --warn: #a9441f;
      --shadow: 0 12px 34px rgba(23, 32, 27, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      padding: 8px 12px;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
      white-space: nowrap;
    }

    button:hover {
      border-color: #aeb9b0;
      background: #f9faf7;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    button.primary:hover {
      background: var(--accent-strong);
    }

    button.danger {
      border-color: #d8b7aa;
      color: var(--warn);
    }

    button.danger:hover {
      border-color: var(--warn);
      background: #fff6f1;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
      color: var(--ink);
      padding: 8px 10px;
    }

    input,
    select {
      min-height: 38px;
    }

    textarea {
      min-height: 230px;
      resize: vertical;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      outline: 2px solid rgba(15, 118, 110, 0.18);
    }

    .shell {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
      border-right: 1px solid var(--line);
      background: #fbfcf8;
      padding: 20px;
    }

    .brand {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 800;
    }

    .brand strong {
      display: block;
      overflow-wrap: anywhere;
      font-size: 15px;
      line-height: 1.2;
    }

    .brand span,
    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .nav {
      display: grid;
      gap: 6px;
    }

    .nav button {
      display: flex;
      justify-content: flex-start;
      width: 100%;
      background: transparent;
      border-color: transparent;
      text-align: left;
    }

    .nav button.active {
      background: var(--panel-soft);
      border-color: var(--line);
      color: var(--accent-strong);
      font-weight: 700;
    }

    .auth {
      display: grid;
      gap: 10px;
      margin-top: auto;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .auth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .main {
      min-width: 0;
      padding: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1.2;
      font-weight: 750;
    }

    h1 {
      font-size: 24px;
    }

    h2 {
      font-size: 16px;
    }

    .status {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      padding: 8px 10px;
      overflow-wrap: anywhere;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .metric,
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .metric {
      min-height: 86px;
      padding: 14px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      overflow-wrap: anywhere;
      font-size: 22px;
      line-height: 1.1;
    }

    .panel {
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }

    .panel-body {
      padding: 14px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--accent-strong);
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .link-button {
      min-height: 30px;
      border: 0;
      background: transparent;
      color: var(--accent-strong);
      padding: 0;
      text-align: left;
      white-space: normal;
    }

    .link-button:hover {
      background: transparent;
      color: var(--accent);
      text-decoration: underline;
    }

    .record-json {
      display: block;
      max-width: 520px;
      margin: 0;
      overflow-wrap: anywhere;
      color: var(--muted);
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
    }

    .record-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .record-editor {
      display: grid;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding: 14px;
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .field-tools {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcf8;
      padding: 12px;
    }

    .field-tools-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .field-tools-form {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) 150px minmax(160px, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .check-field {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .check-field input {
      width: auto;
      min-height: 0;
    }

    .kv {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding: 10px 0;
    }

    .kv:last-child {
      border-bottom: 0;
    }

    .kv span:first-child {
      color: var(--muted);
      font-weight: 700;
    }

    .empty {
      color: var(--muted);
      display: grid;
      gap: 10px;
      justify-items: center;
      padding: 18px;
      text-align: center;
    }

    .empty strong {
      color: var(--ink);
      font-size: 15px;
    }

    .empty-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .error {
      color: var(--warn);
      font-weight: 700;
    }

    @media (max-width: 780px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .auth-actions,
      .field-tools-form,
      .kv {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">RB</div>
        <div>
          <strong>Rusty Base Admin</strong>
          <span id="health">checking</span>
        </div>
      </div>

      <nav class="nav" aria-label="Admin views">
        <button type="button" class="active" data-view="overview">Overview</button>
        <button type="button" data-view="collections">Collections</button>
        <button type="button" data-view="records">Records</button>
        <button type="button" data-view="settings">Settings</button>
      </nav>

      <form class="auth" id="auth-form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" autocomplete="username" value="root@example.com">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password">
        </div>
        <div class="auth-actions">
          <button type="submit" class="primary">Login</button>
          <button type="button" id="init">Initialize</button>
        </div>
        <button type="button" id="logout">Logout</button>
      </form>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h1 id="view-title">Overview</h1>
          <div class="muted" id="session">No token</div>
        </div>
        <div class="status" id="status">Ready</div>
      </div>

      <section class="grid" id="metrics"></section>
      <section class="panel" id="content"></section>
    </main>
  </div>

  <script>
    const tokenKey = "rusty-base.admin.token";
    const state = {
      token: localStorage.getItem(tokenKey) || "",
      view: "overview",
      health: "unknown",
      collections: [],
      selectedCollection: localStorage.getItem("rusty-base.admin.collection") || "",
      records: [],
      recordCount: 0,
      editorMode: "",
      editorRecordId: "",
      editorText: "",
      editorError: "",
      collectionEditorOpen: false,
      collectionEditorMode: "",
      collectionEditorName: "",
      collectionEditorText: "",
      collectionEditorError: "",
      settings: null,
      error: ""
    };

    const $ = (id) => document.getElementById(id);
    const status = (text, failed = false) => {
      $("status").textContent = text;
      $("status").classList.toggle("error", failed);
    };

    const headers = () => state.token ? { Authorization: `Bearer ${state.token}` } : {};

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {
          ...headers(),
          ...(options.headers || {})
        }
      });
      const text = await response.text();
      let body = null;
      try {
        body = text ? JSON.parse(text) : null;
      } catch (_) {
        body = text;
      }
      if (!response.ok) {
        const message = body && body.message ? body.message : `${response.status}`;
        throw new Error(message);
      }
      return body;
    }

    async function jsonApi(path, body, method = "POST") {
      return api(path, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
    }

    async function refresh() {
      state.error = "";
      try {
        const health = await api("/api/health");
        state.health = health.message || "ok";
      } catch (error) {
        state.health = "offline";
        state.error = error.message;
      }

      if (state.token) {
        try {
          const collections = await api("/api/collections?fields=items.id,items.name,items.type,items.system,totalItems");
          state.collections = collections.items || [];
          ensureSelectedCollection();
        } catch (error) {
          state.collections = [];
          state.selectedCollection = "";
          state.records = [];
          state.recordCount = 0;
          state.error = error.message;
        }

        if (state.selectedCollection) {
          await loadRecords(false);
        }

        try {
          state.settings = await api("/api/settings?fields=meta.appName,meta.appURL,batch.enabled,batch.maxRequests,rateLimits.enabled");
        } catch (error) {
          state.settings = null;
          state.error = error.message;
        }
      } else {
        state.collections = [];
        state.selectedCollection = "";
        state.records = [];
        state.recordCount = 0;
        state.settings = null;
      }

      render();
    }

    function render() {
      $("health").textContent = state.health;
      $("session").textContent = state.token ? "Superuser token active" : "No token";
      status(state.error || "Ready", Boolean(state.error));
      document.querySelectorAll(".nav button").forEach((button) => {
        button.classList.toggle("active", button.dataset.view === state.view);
      });

      const appName = state.settings && state.settings.meta ? state.settings.meta.appName : "Rusty Base";
      $("metrics").innerHTML = [
        metric("App", appName),
        metric("Collections", String(state.collections.length)),
        metric("Records", state.selectedCollection ? String(state.recordCount) : "-")
      ].join("");

      $("view-title").textContent = title(state.view);
      if (state.view === "collections") {
        renderCollections();
      } else if (state.view === "records") {
        renderRecords();
      } else if (state.view === "settings") {
        renderSettings();
      } else {
        renderOverview();
      }
    }

    function metric(label, value) {
      return `<div class="metric"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
    }

    function title(view) {
      return view.charAt(0).toUpperCase() + view.slice(1);
    }

    function renderOverview() {
      $("content").innerHTML = `
        <div class="panel-head">
          <h2>Instance</h2>
          <button type="button" id="refresh">Refresh</button>
        </div>
        <div class="panel-body">
          ${row("Health", state.health)}
          ${row("Session", state.token ? "active" : "none")}
          ${row("Collections", String(state.collections.length))}
        </div>
      `;
      $("refresh").addEventListener("click", refresh);
    }

    function renderCollections() {
      if (!state.token) {
        $("content").innerHTML = `
          <div class="empty">
            <strong>Login or initialize first</strong>
            <span>Collections are only available after a superuser session is active.</span>
          </div>
        `;
        return;
      }

      const rows = state.collections.map((collection) => `
        <tr>
          <td>
            <button type="button" class="link-button" data-collection-name="${escapeAttribute(collection.name || "")}">
              ${escapeHtml(collection.name || "")}
            </button>
          </td>
          <td><span class="pill">${escapeHtml(collection.type || "")}</span></td>
          <td>${collection.system ? "system" : "base"}</td>
          <td>
            <div class="record-actions">
              <button type="button" data-collection-select="${escapeAttribute(collection.name || "")}">Select</button>
              <button type="button" data-collection-edit="${escapeAttribute(collection.name || "")}">Edit</button>
              ${collection.system ? "" : `<button type="button" data-collection-truncate="${escapeAttribute(collection.name || "")}">Truncate</button>`}
              ${collection.system ? "" : `<button type="button" class="danger" data-collection-delete="${escapeAttribute(collection.name || "")}">Delete</button>`}
            </div>
          </td>
        </tr>
      `).join("");

      const body = state.collections.length ? `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Type</th><th>Scope</th><th>Actions</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      ` : `
        <div class="empty">
          <strong>No collections yet</strong>
          <span>Create a collection to start browsing and editing records.</span>
        </div>
      `;

      $("content").innerHTML = `
        <div class="panel-head">
          <h2>Collections</h2>
          <div class="record-actions">
            <button type="button" id="new-collection" class="primary">New</button>
            <button type="button" id="refresh">Refresh</button>
          </div>
        </div>
        ${body}
        ${collectionEditorHtml()}
      `;
      $("new-collection").addEventListener("click", () => {
        openCollectionEditor();
        render();
      });
      $("refresh").addEventListener("click", refresh);
      document.querySelectorAll("[data-collection-name]").forEach((button) => {
        button.addEventListener("click", async () => {
          state.selectedCollection = button.dataset.collectionName || "";
          localStorage.setItem("rusty-base.admin.collection", state.selectedCollection);
          state.view = "records";
          await loadRecords(true);
          render();
        });
      });
      document.querySelectorAll("[data-collection-select]").forEach((button) => {
        button.addEventListener("click", async () => {
          state.selectedCollection = button.dataset.collectionSelect || "";
          localStorage.setItem("rusty-base.admin.collection", state.selectedCollection);
          state.view = "records";
          await loadRecords(true);
          render();
        });
      });
      document.querySelectorAll("[data-collection-edit]").forEach((button) => {
        button.addEventListener("click", async () => {
          await openEditCollectionEditor(button.dataset.collectionEdit || "");
        });
      });
      document.querySelectorAll("[data-collection-truncate]").forEach((button) => {
        button.addEventListener("click", async () => {
          await truncateCollection(button.dataset.collectionTruncate || "");
        });
      });
      document.querySelectorAll("[data-collection-delete]").forEach((button) => {
        button.addEventListener("click", async () => {
          await deleteCollection(button.dataset.collectionDelete || "");
        });
      });
      const save = $("save-collection");
      if (save) {
        save.addEventListener("click", saveCollection);
      }
      const cancel = $("cancel-collection");
      if (cancel) {
        cancel.addEventListener("click", () => {
          closeCollectionEditor();
          render();
        });
      }
      const addField = $("add-collection-field");
      if (addField) {
        addField.addEventListener("click", addCollectionField);
      }
      document.querySelectorAll("[data-field-remove]").forEach((button) => {
        button.addEventListener("click", () => {
          removeCollectionField(Number(button.dataset.fieldRemove));
        });
      });
    }

    function collectionEditorHtml() {
      if (!state.collectionEditorOpen) {
        return "";
      }

      const title = state.collectionEditorMode === "edit"
        ? `Edit ${state.collectionEditorName}`
        : "Create collection";
      const draft = collectionEditorDraft();
      return `
        <div class="record-editor">
          <h2>${escapeHtml(title)}</h2>
          ${state.collectionEditorError ? `<div class="error">${escapeHtml(state.collectionEditorError)}</div>` : ""}
          ${collectionFieldToolsHtml(draft)}
          <textarea id="collection-json-input" spellcheck="false">${escapeHtml(state.collectionEditorText)}</textarea>
          <div class="editor-actions">
            <button type="button" id="cancel-collection">Cancel</button>
            <button type="button" id="save-collection" class="primary">Save</button>
          </div>
        </div>
      `;
    }

    function collectionFieldToolsHtml(draft) {
      if (!draft.ok) {
        return `
          <div class="field-tools">
            <div class="field-tools-head">
              <h2>Fields</h2>
              <span class="muted">Fix the collection JSON to use field tools.</span>
            </div>
          </div>
        `;
      }

      const fields = Array.isArray(draft.value.fields) ? draft.value.fields : [];
      const rows = fields.map((field, index) => `
        <tr>
          <td>${escapeHtml(field.name || "")}</td>
          <td><span class="pill">${escapeHtml(field.type || field.kind || "")}</span></td>
          <td>${field.required ? "required" : "-"}</td>
          <td>${escapeHtml(collectionFieldExtra(field))}</td>
          <td><button type="button" class="danger" data-field-remove="${index}">Remove</button></td>
        </tr>
      `).join("");

      return `
        <div class="field-tools">
          <div class="field-tools-head">
            <h2>Fields</h2>
            <span class="muted">${fields.length} user field${fields.length === 1 ? "" : "s"}</span>
          </div>
          ${fields.length ? `
            <div class="table-wrap">
              <table>
                <thead><tr><th>Name</th><th>Type</th><th>Required</th><th>Options</th><th></th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          ` : `<div class="empty"><strong>No user fields yet</strong><span>Add a field or edit the JSON directly.</span></div>`}
          <div class="field-tools-form">
            <input id="new-field-name" placeholder="field name">
            <select id="new-field-type">
              <option value="text">text</option>
              <option value="email">email</option>
              <option value="number">number</option>
              <option value="bool">bool</option>
              <option value="date">date</option>
              <option value="select">select</option>
              <option value="relation">relation</option>
              <option value="file">file</option>
              <option value="json">json</option>
              <option value="url">url</option>
              <option value="editor">editor</option>
            </select>
            <input id="new-field-option" placeholder="select values or relation target">
            <label class="check-field"><input id="new-field-required" type="checkbox">Required</label>
            <button type="button" id="add-collection-field" class="primary">Add</button>
          </div>
        </div>
      `;
    }

    function openCollectionEditor() {
      state.collectionEditorOpen = true;
      state.collectionEditorMode = "create";
      state.collectionEditorName = "";
      state.collectionEditorText = JSON.stringify({
        name: "posts",
        fields: [
          { name: "title", type: "text" }
        ]
      }, null, 2);
      state.collectionEditorError = "";
    }

    async function openEditCollectionEditor(name) {
      if (!name) {
        return;
      }

      try {
        const collection = await api(collectionPath(name));
        state.collectionEditorOpen = true;
        state.collectionEditorMode = "edit";
        state.collectionEditorName = collection.name || name;
        state.collectionEditorText = JSON.stringify(editableCollectionPayload(collection), null, 2);
        state.collectionEditorError = "";
        render();
      } catch (error) {
        status(error.message, true);
      }
    }

    function closeCollectionEditor() {
      state.collectionEditorOpen = false;
      state.collectionEditorMode = "";
      state.collectionEditorName = "";
      state.collectionEditorText = "";
      state.collectionEditorError = "";
    }

    function collectionEditorDraft() {
      try {
        return { ok: true, value: JSON.parse(state.collectionEditorText || "{}") };
      } catch (error) {
        return { ok: false, error };
      }
    }

    function readCollectionEditorPayload() {
      const input = $("collection-json-input");
      const text = input ? input.value : state.collectionEditorText;
      return JSON.parse(text || "{}");
    }

    function writeCollectionEditorPayload(payload) {
      state.collectionEditorText = JSON.stringify(payload, null, 2);
      state.collectionEditorError = "";
      render();
    }

    function addCollectionField() {
      let payload = null;
      try {
        payload = readCollectionEditorPayload();
      } catch (error) {
        state.collectionEditorText = $("collection-json-input") ? $("collection-json-input").value : state.collectionEditorText;
        state.collectionEditorError = error.message;
        render();
        return;
      }

      const name = ($("new-field-name") ? $("new-field-name").value : "").trim();
      const fieldType = $("new-field-type") ? $("new-field-type").value : "text";
      const option = ($("new-field-option") ? $("new-field-option").value : "").trim();
      const required = Boolean($("new-field-required") && $("new-field-required").checked);
      if (!name) {
        state.collectionEditorError = "Field name is required";
        state.collectionEditorText = $("collection-json-input") ? $("collection-json-input").value : state.collectionEditorText;
        render();
        return;
      }

      const fields = Array.isArray(payload.fields) ? payload.fields : [];
      if (fields.some((field) => field && field.name === name)) {
        state.collectionEditorError = `Field '${name}' already exists`;
        state.collectionEditorText = $("collection-json-input") ? $("collection-json-input").value : state.collectionEditorText;
        render();
        return;
      }
      if (fieldType === "relation" && !option) {
        state.collectionEditorError = "Relation target collection is required";
        state.collectionEditorText = $("collection-json-input") ? $("collection-json-input").value : state.collectionEditorText;
        render();
        return;
      }

      const field = { name, type: fieldType };
      if (required) {
        field.required = true;
      }
      if (fieldType === "relation") {
        if (option) {
          field.collection = option;
        }
        field.maxSelect = 1;
      } else if (fieldType === "select" && option) {
        field.values = option.split(",").map((value) => value.trim()).filter(Boolean);
      } else if (fieldType === "file") {
        field.maxSelect = 1;
      }

      payload.fields = fields.concat(field);
      writeCollectionEditorPayload(payload);
    }

    function removeCollectionField(index) {
      let payload = null;
      try {
        payload = readCollectionEditorPayload();
      } catch (error) {
        state.collectionEditorText = $("collection-json-input") ? $("collection-json-input").value : state.collectionEditorText;
        state.collectionEditorError = error.message;
        render();
        return;
      }

      if (!Array.isArray(payload.fields) || !Number.isInteger(index) || index < 0 || index >= payload.fields.length) {
        return;
      }
      payload.fields = payload.fields.filter((_, fieldIndex) => fieldIndex !== index);
      writeCollectionEditorPayload(payload);
    }

    function collectionFieldExtra(field) {
      if (field.collection) {
        return `target: ${field.collection}`;
      }
      if (Array.isArray(field.values) && field.values.length) {
        return `values: ${field.values.join(", ")}`;
      }
      if (field.maxSelect != null) {
        return `max: ${field.maxSelect}`;
      }
      return "";
    }

    async function saveCollection() {
      const input = $("collection-json-input");
      if (!input) {
        return;
      }

      let payload = null;
      try {
        payload = JSON.parse(input.value || "{}");
      } catch (error) {
        state.collectionEditorText = input.value;
        state.collectionEditorError = error.message;
        render();
        return;
      }

      try {
        const editing = state.collectionEditorMode === "edit";
        const saved = state.collectionEditorMode === "edit"
          ? await jsonApi(collectionPath(state.collectionEditorName), payload, "PATCH")
          : await jsonApi("/api/collections", payload, "POST");
        closeCollectionEditor();
        state.selectedCollection = saved && saved.name ? saved.name : payload.name || "";
        if (state.selectedCollection) {
          localStorage.setItem("rusty-base.admin.collection", state.selectedCollection);
        }
        state.view = "records";
        status(editing ? "Collection saved" : "Collection created");
        await refresh();
      } catch (error) {
        state.collectionEditorText = input.value;
        state.collectionEditorError = error.message;
        render();
      }
    }

    async function truncateCollection(name) {
      if (!name || !confirm(`Delete all records in ${name}?`)) {
        return;
      }

      try {
        await api(`${collectionPath(name)}/truncate`, { method: "DELETE" });
        if (state.selectedCollection === name) {
          await loadRecords(false);
        }
        status("Collection truncated");
        await refresh();
      } catch (error) {
        status(error.message, true);
      }
    }

    async function deleteCollection(name) {
      if (!name || !confirm(`Delete collection ${name}?`)) {
        return;
      }

      try {
        await api(collectionPath(name), { method: "DELETE" });
        if (state.selectedCollection === name) {
          state.selectedCollection = "";
          localStorage.removeItem("rusty-base.admin.collection");
          closeRecordEditor();
        }
        status("Collection deleted");
        await refresh();
      } catch (error) {
        status(error.message, true);
      }
    }

    function renderRecords() {
      const collection = currentCollection();
      if (!state.token) {
        $("content").innerHTML = `
          <div class="empty">
            <strong>Login or initialize first</strong>
            <span>Records are available after a superuser session is active.</span>
          </div>
        `;
        return;
      }

      if (!collection) {
        $("content").innerHTML = `
          <div class="empty">
            <strong>No collection selected</strong>
            <span>Create or select a collection before browsing records.</span>
            <div class="empty-actions">
              <button type="button" id="go-collections" class="primary">Go to Collections</button>
            </div>
          </div>
        `;
        $("go-collections").addEventListener("click", async () => {
          await setView("collections");
        });
        return;
      }

      const rows = state.records.map((record) => `
        <tr>
          <td>${escapeHtml(record.id || "")}</td>
          <td>${escapeHtml(record.created || "-")}</td>
          <td>${escapeHtml(record.updated || "-")}</td>
          <td><code class="record-json">${escapeHtml(recordPreview(record))}</code></td>
          <td>
            <div class="record-actions">
              <button type="button" data-edit-record="${escapeAttribute(record.id || "")}">Edit</button>
              <button type="button" class="danger" data-delete-record="${escapeAttribute(record.id || "")}">Delete</button>
            </div>
          </td>
        </tr>
      `).join("");

      $("content").innerHTML = `
        <div class="panel-head">
          <h2>${escapeHtml(collection.name)} records</h2>
          <div class="record-actions">
            <button type="button" id="new-record" class="primary">New</button>
            <button type="button" id="refresh-records">Refresh</button>
          </div>
        </div>
        ${state.records.length ? `
          <div class="table-wrap">
            <table>
              <thead><tr><th>ID</th><th>Created</th><th>Updated</th><th>Data</th><th>Actions</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        ` : `
          <div class="empty">
            <strong>No records yet</strong>
            <span>Create the first record in this collection.</span>
          </div>
        `}
        ${recordEditorHtml()}
      `;
      $("new-record").addEventListener("click", () => {
        openCreateEditor();
        render();
      });
      $("refresh-records").addEventListener("click", async () => {
        await loadRecords(false);
        render();
      });
      document.querySelectorAll("[data-edit-record]").forEach((button) => {
        button.addEventListener("click", () => {
          openEditEditor(button.dataset.editRecord || "");
          render();
        });
      });
      document.querySelectorAll("[data-delete-record]").forEach((button) => {
        button.addEventListener("click", async () => {
          await deleteRecord(button.dataset.deleteRecord || "");
        });
      });
      const save = $("save-record");
      if (save) {
        save.addEventListener("click", saveRecord);
      }
      const cancel = $("cancel-record");
      if (cancel) {
        cancel.addEventListener("click", () => {
          closeRecordEditor();
          render();
        });
      }
    }

    function recordEditorHtml() {
      if (!state.editorMode) {
        return "";
      }

      const title = state.editorMode === "edit" ? `Edit ${state.editorRecordId}` : "Create record";
      return `
        <div class="record-editor">
          <h2>${escapeHtml(title)}</h2>
          ${state.editorError ? `<div class="error">${escapeHtml(state.editorError)}</div>` : ""}
          <textarea id="record-json-input" spellcheck="false">${escapeHtml(state.editorText)}</textarea>
          <div class="editor-actions">
            <button type="button" id="cancel-record">Cancel</button>
            <button type="button" id="save-record" class="primary">Save</button>
          </div>
        </div>
      `;
    }

    function openCreateEditor() {
      state.editorMode = "create";
      state.editorRecordId = "";
      state.editorText = "{}";
      state.editorError = "";
    }

    function openEditEditor(id) {
      const record = state.records.find((item) => item.id === id);
      if (!record) {
        state.editorError = "Record not found";
        return;
      }
      state.editorMode = "edit";
      state.editorRecordId = id;
      state.editorText = JSON.stringify(editableRecordPayload(record), null, 2);
      state.editorError = "";
    }

    function closeRecordEditor() {
      state.editorMode = "";
      state.editorRecordId = "";
      state.editorText = "";
      state.editorError = "";
    }

    async function saveRecord() {
      const collection = currentCollection();
      const input = $("record-json-input");
      if (!collection || !input) {
        return;
      }

      let payload = null;
      try {
        payload = JSON.parse(input.value || "{}");
      } catch (error) {
        state.editorText = input.value;
        state.editorError = error.message;
        render();
        return;
      }

      try {
        if (state.editorMode === "edit") {
          await jsonApi(recordPath(collection.name, state.editorRecordId), payload, "PATCH");
        } else {
          await jsonApi(collectionRecordsPath(collection.name), payload, "POST");
        }
        closeRecordEditor();
        status("Saved");
        await loadRecords(true);
        render();
      } catch (error) {
        state.editorText = input.value;
        state.editorError = error.message;
        render();
      }
    }

    async function deleteRecord(id) {
      const collection = currentCollection();
      if (!collection || !id || !confirm(`Delete record ${id}?`)) {
        return;
      }

      try {
        await api(recordPath(collection.name, id), { method: "DELETE" });
        if (state.editorRecordId === id) {
          closeRecordEditor();
        }
        status("Deleted");
        await loadRecords(true);
        render();
      } catch (error) {
        status(error.message, true);
      }
    }

    function renderSettings() {
      const settings = state.settings || {};
      const meta = settings.meta || {};
      const batch = settings.batch || {};
      const rateLimits = settings.rateLimits || {};
      $("content").innerHTML = `
        <div class="panel-head">
          <h2>Settings</h2>
          <button type="button" id="refresh">Refresh</button>
        </div>
        <div class="panel-body">
          ${row("App name", meta.appName || "-")}
          ${row("App URL", meta.appURL || "-")}
          ${row("Batch", batch.enabled === false ? "disabled" : "enabled")}
          ${row("Max requests", batch.maxRequests == null ? "-" : String(batch.maxRequests))}
          ${row("Rate limits", rateLimits.enabled ? "enabled" : "disabled")}
        </div>
      `;
      $("refresh").addEventListener("click", refresh);
    }

    function row(label, value) {
      return `<div class="kv"><span>${escapeHtml(label)}</span><span>${escapeHtml(value)}</span></div>`;
    }

    async function setView(view) {
      state.view = view;
      if (view === "records") {
        ensureSelectedCollection();
        await loadRecords(true);
      }
      render();
    }

    function ensureSelectedCollection() {
      if (state.collections.some((collection) => collection.name === state.selectedCollection)) {
        return;
      }
      state.selectedCollection = state.collections[0] ? state.collections[0].name : "";
      if (state.selectedCollection) {
        localStorage.setItem("rusty-base.admin.collection", state.selectedCollection);
      }
    }

    function currentCollection() {
      return state.collections.find((collection) => collection.name === state.selectedCollection) || null;
    }

    async function loadRecords(showErrors = true) {
      const collection = currentCollection();
      if (!state.token || !collection) {
        state.records = [];
        state.recordCount = 0;
        return;
      }

      try {
        const page = await api(`${collectionRecordsPath(collection.name)}?perPage=20&sort=-created`);
        state.records = page.items || [];
        state.recordCount = page.totalItems == null ? state.records.length : page.totalItems;
      } catch (error) {
        state.records = [];
        state.recordCount = 0;
        if (showErrors) {
          state.error = error.message;
        }
      }
    }

    function collectionRecordsPath(collectionName) {
      return `/api/collections/${encodeURIComponent(collectionName)}/records`;
    }

    function collectionPath(collectionName) {
      return `/api/collections/${encodeURIComponent(collectionName)}`;
    }

    function recordPath(collectionName, id) {
      return `${collectionRecordsPath(collectionName)}/${encodeURIComponent(id)}`;
    }

    function editableCollectionPayload(collection) {
      const copy = { ...collection };
      delete copy.id;
      delete copy.created;
      delete copy.updated;
      delete copy.system;
      delete copy.indexWarnings;
      if (Array.isArray(copy.fields)) {
        copy.fields = copy.fields.filter((field) => !isResponseOnlyCollectionField(field));
      }
      return copy;
    }

    function isResponseOnlyCollectionField(field) {
      if (!field || typeof field !== "object") {
        return false;
      }
      if (field.name === "id" && field.primaryKey) {
        return true;
      }
      return (field.name === "created" || field.name === "updated") && field.type === "autodate";
    }

    function editableRecordPayload(record) {
      const copy = { ...record };
      delete copy.id;
      delete copy.created;
      delete copy.updated;
      delete copy.collectionId;
      delete copy.collectionName;
      delete copy.expand;
      return copy;
    }

    function recordPreview(record) {
      const copy = { ...record };
      delete copy.collectionId;
      delete copy.collectionName;
      const text = JSON.stringify(copy, null, 2);
      return text.length > 360 ? `${text.slice(0, 357)}...` : text;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    document.querySelectorAll(".nav button").forEach((button) => {
      button.addEventListener("click", () => {
        setView(button.dataset.view);
      });
    });

    $("auth-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const body = await jsonApi("/api/collections/_superusers/auth-with-password", {
          identity: $("email").value,
          password: $("password").value
        });
        state.token = body.token || "";
        localStorage.setItem(tokenKey, state.token);
        status("Logged in");
        await refresh();
      } catch (error) {
        status(error.message, true);
      }
    });

    $("init").addEventListener("click", async () => {
      try {
        await jsonApi("/api/collections", {
          name: "_superusers",
          type: "auth",
          fields: [{ name: "email", type: "email" }]
        }).catch(() => null);
        await jsonApi("/api/collections/_superusers/records", {
          email: $("email").value,
          password: $("password").value,
          passwordConfirm: $("password").value
        });
        const body = await jsonApi("/api/collections/_superusers/auth-with-password", {
          identity: $("email").value,
          password: $("password").value
        });
        state.token = body.token || "";
        localStorage.setItem(tokenKey, state.token);
        status("Initialized and logged in");
        await refresh();
      } catch (error) {
        status(error.message, true);
      }
    });

    $("logout").addEventListener("click", async () => {
      state.token = "";
      localStorage.removeItem(tokenKey);
      state.collections = [];
      state.records = [];
      state.recordCount = 0;
      state.settings = null;
      closeRecordEditor();
      closeCollectionEditor();
      await refresh();
    });

    refresh();
  </script>
</body>
</html>
